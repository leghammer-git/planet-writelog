name: Aggregate feeds

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate people files
        run: node scripts/validate-people.js

      - name: Run aggregator
        run: node scripts/aggregate.js

      - name: Commit updated data
        run: |
          git config user.name  "planet-writelog[bot]"
          git config user.email "planet-writelog[bot]@users.noreply.github.com"
          git pull --rebase origin master
          git add _data/items.json _data/people.json
          git diff --cached --quiet || git commit -m "chore: update feed data [skip ci]"
          git push
